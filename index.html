<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <!-- Link stylesheet  -->
    <link rel="stylesheet" href="Assests/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="todo-list">
        <h1>Manage Your Tasks</h1>

        <div class="inner-container">
          <input
            type="text"
            placeholder="Add your task here"
            value=""
            name="todo"
            class="input"
            id="inputfield"
          />

          <button class="add-button" id="submit">Add</button>
        </div>

        <div class="output">
          <ul id="output"></ul>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
